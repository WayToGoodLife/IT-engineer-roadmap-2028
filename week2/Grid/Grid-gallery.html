<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid Gallery</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <h1>Галерея городских пейзажей</h1>


    <div class="grid-container">
      <div class="gallery-item main" data-title="Мост Куинсборо, New-York">
        <img
          src="https://i.pinimg.com/originals/dd/08/f2/dd08f291b92b98f95d69107dd1d1fd6c.jpg"
          alt=""
        />
      </div>

      <div class="gallery-item" data-title="Realtor Building, Чикаго">
        <img
          src="https://i.pinimg.com/736x/23/dc/16/23dc169755f5d8499a3db169b6140411.jpg"
          alt=""
        />
      </div>

      <div class="gallery-item" data-title="Раффлз-Сити, Сингапур">
        <img
          src="https://img.freepik.com/premium-photo/city-photography-landscape_1417-8950.jpg"
          alt=""
        />
      </div>

      <div class="gallery-item" data-title="Empire State, New-York">
        <img
          src="https://i.pinimg.com/736x/a5/9a/2d/a59a2d7341995e943ea455b68a3b8cdc.jpg"
          alt=""
        />
      </div>

      <div class="gallery-item" data-title="Уиллис-тауэр, США">
        <img
          src="https://avatars.mds.yandex.net/get-shedevrum/15067795/img_9aaec61e555711f09423b225f0806def/orig"
          alt=""
        />
      </div>

      <div class="gallery-item" data-title="Вертикаль власти, Манхэттен">
        <img
          src="https://avatars.mds.yandex.net/i?id=3306ffbd60dc4a858817cc65b859dd2f_l-5179994-images-thumbs&n=13"
          alt=""
        />
      </div>

      <div class="gallery-item" data-title=" Moscow CITY, Москва">
        <img
          src="https://avatars.mds.yandex.net/i?id=308593a271657052c84efa31e65bab20_l-5331420-images-thumbs&n=13"
          alt=""
        />
      </div>
    </div>
  </body>
</html>
